name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-latest
          - os: darwin
            arch: amd64
            runner: macos-latest
          - os: darwin
            arch: arm64
            runner: macos-latest
          - os: windows
            arch: amd64
            runner: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
          cache-dependency-path: ext/down/go.sum

      - name: Build
        run: |
          cd ext/down
          mkdir -p dist
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -ldflags="-s -w" -o dist/down .
        shell: bash

      - name: Package (unix)
        if: matrix.os != 'windows'
        run: |
          cd ext/down/dist
          chmod +x down
          tar -czf down-${{ matrix.os }}-${{ matrix.arch }}.tar.gz down
        shell: bash

      - name: Package (windows)
        if: matrix.os == 'windows'
        run: |
          cd ext/down/dist
          Compress-Archive -Path down.exe -DestinationPath down-${{ matrix.os }}-${{ matrix.arch }}.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: down-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            ext/down/dist/down*
            !ext/down/dist/down.exe
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Display structure
        run: ls -R dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/down-linux-amd64/down-linux-amd64.tar.gz
            dist/down-linux-arm64/down-linux-arm64.tar.gz
            dist/down-darwin-amd64/down-darwin-amd64.tar.gz
            dist/down-darwin-arm64/down-darwin-arm64.tar.gz
            dist/down-windows-amd64/down-windows-amd64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
